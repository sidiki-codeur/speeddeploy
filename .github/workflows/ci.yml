name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -e .
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check speeddeploy tests bootstrap_tests.py

      - name: Tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke tests
        run: |
          python -m speeddeploy --help
          python -m speeddeploy.v2 --help
          python -m speeddeploy v2 info --help
          python -m speeddeploy v2 diagnose --help
